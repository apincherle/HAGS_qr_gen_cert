spring:
  application:
    name: qr-certificate-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hags_customer}
    username: ${SPRING_DATASOURCE_USERNAME:hags_user}
    password: ${SPRING_DATASOURCE_PASSWORD:hags_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# QR Certificate Configuration
qr:
  certificate:
    base-url: ${QR_BASE_URL:https://www.hags-grading.co.uk}
    secret: ${QR_CERT_SECRET:change-me-please}
    qr-storage-path: ${QR_STORAGE_PATH:./static/qrs}
    serial-prefix: ${QR_SERIAL_PREFIX:HAGS}

server:
  port: ${SERVER_PORT:8019}

logging:
  level:
    root: INFO
    com.hags: DEBUG

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

