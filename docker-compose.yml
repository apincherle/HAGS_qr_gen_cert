version: '3.8'

services:
  qr-certificate-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qr-certificate-system
    ports:
      - "8019:8019"
    environment:
      - SERVER_PORT=8019
      - QR_STORAGE_PATH=/app/static/qrs
    volumes:
      - qr_storage:/app/static/qrs
    restart: unless-stopped

volumes:
  qr_storage:

